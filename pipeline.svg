<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Avery GTM agent — new 4-step pipeline</title>
  <desc>Exa → Surfe → Claude → Send</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #412402; }
      .ts { font-size: 12px; font-weight: 400; fill: #633806; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }

      /* Amber — Step 1 */
      .s1-outer { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.5; }
      .s1-inner { fill: #FAC775; stroke: #BA7517; stroke-width: 0.5; }

      /* Purple — Step 2 */
      .s2-outer { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .s2-inner { fill: #CECBF6; stroke: #534AB7; stroke-width: 0.5; }
      .s2-text-title { fill: #26215C; }
      .s2-text-sub   { fill: #3C3489; }

      /* Teal — Step 3 */
      .s3-outer { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .s3-inner { fill: #9FE1CB; stroke: #0F6E56; stroke-width: 0.5; }
      .s3-text-title { fill: #04342C; }
      .s3-text-sub   { fill: #085041; }

      /* Coral — Step 4 */
      .s4-outer { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
      .s4-inner { fill: #F5C4B3; stroke: #993C1D; stroke-width: 0.5; }
      .s4-text-title { fill: #4A1B0C; }
      .s4-text-sub   { fill: #712B13; }

      /* Gray — output */
      .sg-outer { fill: #D3D1C7; stroke: #5F5E5A; stroke-width: 0.5; }
      .sg-text  { fill: #2C2C2A; font-size: 12px; font-family: sans-serif; }
    </style>
  </defs>

  <!-- Step 1: Exa -->
  <rect x="40" y="20" width="600" height="110" rx="12" class="s1-outer"/>
  <text class="th" x="340" y="46" text-anchor="middle" dominant-baseline="central">Step 1 — Exa: company discovery</text>
  <rect x="60"  y="64" width="168" height="52" rx="8" class="s1-inner"/>
  <text class="th" x="144" y="83"  text-anchor="middle" dominant-baseline="central">ICP query</text>
  <text class="ts" x="144" y="101" text-anchor="middle" dominant-baseline="central">EU, 50-200, Series A/B</text>
  <rect x="246" y="64" width="168" height="52" rx="8" class="s1-inner"/>
  <text class="th" x="330" y="83"  text-anchor="middle" dominant-baseline="central">Entity extraction</text>
  <text class="ts" x="330" y="101" text-anchor="middle" dominant-baseline="central">name, domain, headcount</text>
  <rect x="432" y="64" width="188" height="52" rx="8" class="s1-inner"/>
  <text class="th" x="526" y="83"  text-anchor="middle" dominant-baseline="central">ICP filter</text>
  <text class="ts" x="526" y="101" text-anchor="middle" dominant-baseline="central">rules-based, no LLM cost</text>

  <line x1="340" y1="130" x2="340" y2="165" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 2: Surfe -->
  <rect x="40" y="165" width="600" height="110" rx="12" class="s2-outer"/>
  <text class="th s2-text-title" x="340" y="191" text-anchor="middle" dominant-baseline="central">Step 2 — Surfe: contact identification</text>
  <rect x="60"  y="209" width="178" height="52" rx="8" class="s2-inner"/>
  <text class="th s2-text-title" x="149" y="228" text-anchor="middle" dominant-baseline="central">People search</text>
  <text class="ts s2-text-sub"   x="149" y="246" text-anchor="middle" dominant-baseline="central">role priority by headcount</text>
  <rect x="256" y="209" width="178" height="52" rx="8" class="s2-inner"/>
  <text class="th s2-text-title" x="345" y="228" text-anchor="middle" dominant-baseline="central">People enrich</text>
  <text class="ts s2-text-sub"   x="345" y="246" text-anchor="middle" dominant-baseline="central">email + LinkedIn URL</text>
  <rect x="452" y="209" width="168" height="52" rx="8" class="s2-inner"/>
  <text class="th s2-text-title" x="536" y="228" text-anchor="middle" dominant-baseline="central">Output</text>
  <text class="ts s2-text-sub"   x="536" y="246" text-anchor="middle" dominant-baseline="central">name, title, email, LI</text>

  <line x1="340" y1="275" x2="340" y2="310" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 3: Claude -->
  <rect x="40" y="310" width="600" height="120" rx="12" class="s3-outer"/>
  <text class="th s3-text-title" x="340" y="336" text-anchor="middle" dominant-baseline="central">Step 3 — Claude: outreach drafting</text>
  <rect x="60"  y="354" width="168" height="62" rx="8" class="s3-inner"/>
  <text class="th s3-text-title" x="144" y="373" text-anchor="middle" dominant-baseline="central">Context assembly</text>
  <text class="ts s3-text-sub"   x="144" y="391" text-anchor="middle" dominant-baseline="central">company + contact +</text>
  <text class="ts s3-text-sub"   x="144" y="405" text-anchor="middle" dominant-baseline="central">Avery pitch</text>
  <rect x="246" y="354" width="168" height="62" rx="8" class="s3-inner"/>
  <text class="th s3-text-title" x="330" y="373" text-anchor="middle" dominant-baseline="central">Email draft</text>
  <text class="ts s3-text-sub"   x="330" y="391" text-anchor="middle" dominant-baseline="central">subject + body,</text>
  <text class="ts s3-text-sub"   x="330" y="405" text-anchor="middle" dominant-baseline="central">Avery tone</text>
  <rect x="432" y="354" width="188" height="62" rx="8" class="s3-inner"/>
  <text class="th s3-text-title" x="526" y="373" text-anchor="middle" dominant-baseline="central">LinkedIn variant</text>
  <text class="ts s3-text-sub"   x="526" y="391" text-anchor="middle" dominant-baseline="central">shorter, more casual,</text>
  <text class="ts s3-text-sub"   x="526" y="405" text-anchor="middle" dominant-baseline="central">connection note</text>

  <line x1="340" y1="430" x2="340" y2="465" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 4: Send -->
  <rect x="40" y="465" width="600" height="110" rx="12" class="s4-outer"/>
  <text class="th s4-text-title" x="340" y="491" text-anchor="middle" dominant-baseline="central">Step 4 — Send</text>
  <rect x="60"  y="509" width="178" height="52" rx="8" class="s4-inner"/>
  <text class="th s4-text-title" x="149" y="528" text-anchor="middle" dominant-baseline="central">Review queue</text>
  <text class="ts s4-text-sub"   x="149" y="546" text-anchor="middle" dominant-baseline="central">approve before sending</text>
  <rect x="256" y="509" width="178" height="52" rx="8" class="s4-inner"/>
  <text class="th s4-text-title" x="345" y="528" text-anchor="middle" dominant-baseline="central">Email</text>
  <text class="ts s4-text-sub"   x="345" y="546" text-anchor="middle" dominant-baseline="central">SMTP / SendGrid</text>
  <rect x="452" y="509" width="168" height="52" rx="8" class="s4-inner"/>
  <text class="th s4-text-title" x="536" y="528" text-anchor="middle" dominant-baseline="central">LinkedIn</text>
  <text class="ts s4-text-sub"   x="536" y="546" text-anchor="middle" dominant-baseline="central">manual / Phantombuster</text>

  <line x1="340" y1="575" x2="340" y2="598" class="arr" marker-end="url(#arrow)"/>
  <rect x="180" y="598" width="300" height="16" rx="4" class="sg-outer"/>
  <text class="sg-text" x="330" y="607" text-anchor="middle" dominant-baseline="central">dashboard for outreach queue</text>
</svg>